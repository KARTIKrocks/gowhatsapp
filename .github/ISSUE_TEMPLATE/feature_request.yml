name: Feature request
description: Suggest a capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that the library doesn't support yet?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: |
        Sketch the Go API you'd like (types, methods). Note which roadmap phase
        in DESIGN.md it relates to, if any.
      render: go
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
